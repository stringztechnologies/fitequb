name: CI

on:
  pull_request:
    branches: [main]

env:
  SUPABASE_URL: "https://example.supabase.co"
  SUPABASE_ANON_KEY: "fake-key-for-ci"
  SUPABASE_SERVICE_ROLE_KEY: "fake-key-for-ci"
  TELEGRAM_BOT_TOKEN: "fake:token"
  CHAPA_SECRET_KEY: "fake-key"
  CHAPA_WEBHOOK_SECRET: "fake-secret"
  CRON_SECRET: "fake-secret"
  API_URL: "http://localhost:3000"
  TELEGRAM_MINI_APP_URL: "https://fitequb.com"

jobs:
  check:
    name: Lint, Typecheck, Build, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test --run
